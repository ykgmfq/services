[global]
server role = standalone server

# Run with a read-only container rootfs: every writable runtime database lives
# on the tmpfs that podman mounts at /run, and the user database is seeded into
# the writable private dir by the entrypoint. smbd logs to stdout (journald)
# via --debug-stdout; the helper daemons that still log to files use the tmpfs
# mounted at /var/log/samba by the quadlet.
passdb backend = tdbsam
private dir = /run/samba/private
state directory = /run/samba/state
cache directory = /run/samba/cache
lock directory = /run/samba/lock

########## Domains ###########
[scans]
comment = Scan inbox
valid users = scan
path = /srv/scans
create mask = 0660
writable = yes
browsable = yes

[media]
comment = Jellyfin media collection
path = /srv/media
create mask = 0664
writable = yes
browsable = yes
valid users = media
# Schreiben mit iOS wirft Fehler "Dateiname zu lang"
# https://www.linuxquestions.org/questions/linux-server-73/file-transfer-fails-iphone-to-samba-on-ubuntu-4175726887/#post6447513
vfs objects = fruit catia streams_xattr

[monitor]
comment = Monitoring endpoint
valid users = monitor
path = /opt/monitor
browsable = yes
writable = no
